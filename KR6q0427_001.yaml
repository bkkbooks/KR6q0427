body:
  text: 書記師住妙印錄師於順治庚子年自千山回廣寧時城守白護法領眾檀越建雙峰禪院見魔黨嫉妒心欲力觝辛丑正月八日城守領僧俗眾檀越請師於城裡普慈寺開堂以證邪宗師在北鎮山興隆庵受帖進寺白護法領僧俗送師入方丈畢請師陞座師至座前云吾今懸古聖之寶鑑照諸魔形了也喝一喝遂陞座拈香云此一瓣香祝延今上皇帝聖壽無疆恭願堯仁廣被齊日月之盛明湯德彌新並乾坤之永固次拈香云此一瓣香奉為滿朝文武一切大護法伏願長為外護之紀綱永作皇家之梁棟次拈香云此一瓣香奉為現前廣寧城守白護法及居士等伏願舉族享於百祥合府增乎善慶又拈香云此一瓣香非從天降亦非地生採於無影樹上囊藏久矣今日人天眾前拈出奉供先住嘉興府秀水縣南湖如如堂上傳曹溪正脈第三十六世本師介為老和尚用酬法乳之恩乃就座上首白槌云法筵龍象眾當觀第一義師拈拄杖卓一卓云驚天動地也既爾驚天動地汝四大天王天龍八部昔釋迦如來曾在靈山付囑汝等護持佛法今波旬與佛教而作障難汝等為甚不護持乃呵呵云他方雲遊二十年到處訪友慕高賢過了千山經萬水褌破皮露鞋又穿須知予本無別意一心專為要參玄只因昔年多辛苦今日方得至理圓休誇至理圓魔子聞之起厭嫌何故狐非獅子類驢難比象肩時邪宗者遂使一人名獨步領眾魔徒擁逼於座師以杖指云無知之徒前白搥已即當問話如何說法中而來擾亂且容你試問看步問世尊拈花迦葉微笑即不問如何是法輪常轉師卓杖云會麼步無語師便打步擬議師又打云立地死漢步曰問話為甚打起來師云豈不知吾臨濟門庭棒如雨點喝似雷奔汝來我者裡作打會又連打數棒師復就座普說師說法畢暴風哮吼眾服駭然普說另錄住遼陽永安寺語錄師於順治辛丑年秋在廣寧興隆庵受襄平郡城守有倉耿居士及僧綱憫榮院主大宇居士等恭請住永安寺十月十五日結制陞座師云大清國裏無禪師禮拜歸堂更莫疑阿呵呵堪笑河陽新婦子不如臨濟小廝兒大眾且道何處不如他景雲覆遼海襄平轟霹靂喝一喝下座盛京談家庵赤崖禪師差監寺南宗大德領眾居士設齋請師陞座拈香畢斂衣就座云臨濟建立黃檗宗乘有普化克符二人成褫所以臨濟宗風名振夫下得二尊宿之力至今出吾遠孫從來擔板與人為怨無人成褫但有見影聞名無不憎嫌融道人見此愚輩不識好惡更與矢上加尖秉一口純剛慧劍魔也揮佛也揮聖也揮凡也揮物也揮空也揮只使一切人上無佛道可成下無眾生可度纔稱融道人之本懷若人會得歸家穩坐其或未然更疑到驢年便下座崔文登居士請上堂師云荳好合醬鹽好煮羹問汝諸人是甚麼滋味出來道看有麼若無更聽山僧偈云今有一事沒奈何飯籮邊餓死禪和二人設計中紅心疑煞廚前小典座參德藏領眾尼善女請上堂師云一有多種二無兩般鉤頭取則莫認定盤有麼復舉末山尼因灌溪問如何是末山尼曰不露頂溪曰如何是末山主尼曰非男女相溪喝曰何不變去尼曰不是神不是鬼變個甚麼師云大小灌溪似將咫尺而量須彌末山尼雖則善辨來音未能接得灌溪待他問如何是末山何不只向道兔子喫牛奶尼曰不露頂師云露出了也溪曰如何是末山主師云再犯不容尼曰非男女相師云從何得者消息來溪曰何不變去師云孟八郎漢又恁麼去也尼曰不是神不是鬼變個甚麼師云汝恁麼三頭六臂太駭人生大眾山僧者等批判還有撿點出的麼試撿點看若無山僧更與汝等頌出頌云末山主非男女獨露堂堂見也麼靈光萬古世界輝照破山河佛與魔盛京觀音庵輝宗律主領眾檀越請上堂僧問擊破無明殼捉住這個獻在當堂憑師發落師云如何是你這個僧擬議師便打進云靈光從來透古今師云汝從何得者消息來僧復擬議師又打舉世尊臨入涅槃以手摩胸普告人天大眾云汝等諦觀吾紫磨金色之身瞻仰取足莫令後悔若言吾滅度非吾弟子若言吾不滅亦非吾弟子師云離此二途還有知釋迦如來落處者麼若有出來道看若無融道人與眾等頌出頌云推不出拽不入解脫門開何處立智炬煌煌照大千空向雙林痛悲泣廣祐寺長老領眾請上堂師云象王蹴蹋寶岩皆崩非驢所能獅子嚬呻狐精隱跡野干聞吼立地灙尿祖師家風中下難湊眾中莫不還有勇猛上將疋馬單鎗出來戰一合者麼良久云出群須是英靈漢敵勝還他獅子兒卓拄杖下座保安寺監寺心宇領眾請上堂師云人困馬困未是困露柱之困始是困好於言下悟無生莫向言中尋尺寸還有悟無生者麼出來通個消息有麼良久云不知顏回何處去卻令夫子淚漣漣卓拄杖下座甘泉舖監院清風領眾請上堂云清風吹動釣魚舟漁翁拋綸把釣竿順水推船人人易逆風把柁個個難有甚難只為渠儂人不濟遂以拄杖作拿柁勢歌云這些白浪堆中住來去逍遙自在行此船卻也太平穩諸子快上休貪娛莫待船開悔後遲喝一喝下座守備常德安領眾請上堂云入道不通理復身還信施大眾且道理作麼生通復拈起拄杖云拄杖子一口吞卻百億須彌盧百億四天下其中眾生不知不覺無障無礙各作各事汝等曉得也未若還曉得說甚還施日將斗金供養汝等也合消得其或未然只恐滴水也難消他日後莫言山僧不道因執事遭事亡盛京桂弘祖居士領眾設齋師陞座云生涯如夢若浮雲活計都無絕六親半夜烏雞何處去天明吞卻玉麒麟良久云會麼若還會得鋤地唱山歌也是一場大快活其或未然永安寺拋土撒沙迷人眼內成翳只得舉頭見空花開口說寐語再住永安禪寺語錄師於康熙丙午年在廣寧福田寺受遼陽城守有倉耿護法及本寺僧綱祖亮院主居士等恭請於十月十八日結制開堂師至法座前云坐斷古佛路頭潛竄野狐妖怪任是須彌燈王也須速禮三拜喝一喝遂陞座拈香云此一瓣香祝延今上皇帝陛下伏願龍圖永固鳳曆常新次拈香云此一瓣香奉為城守耿護法洎闔州尊官伏願佳聲藹著善政日新恒作棟梁常居祿位次拈香云此一瓣香還知落處麼遇貴則價重娑婆遇賤分文不值欲隱彌露在晦愈明昔在人天眾前也曾拈出今眾中恐有未知氣息者不免重新說破奉為先住嘉興府秀水縣南湖如如堂上傳曹溪正脈本師介為老和尚用酬法乳雖然恩大難酬聊表化儀乃就座上首白搥云法筵龍象眾當觀第一義師拈拄杖云臨濟下兒孫三要四主賓擬議攔腮掌誰敢續祖燈眾中莫還有不惜性命的漢出來與山僧拄杖子相見有麼乃云出群須是英靈漢敵勝還他獅子兒謝詞不錄復舉歸宗會下有一僧夜中大叫我悟了我悟了天曉宗云夜間大悟的僧出來其僧便出宗云你見個甚麼道理便言大悟僧云師姑元是女兒做宗頷之師云山僧則不然待他云師姑元是女兒做便向他道諦當諦當甚諦當敢保未徹在待他眼目定動即連棒打出何故免得者僧墮在悟坑沉於死水盛京汪僧錄苗道錄暨眾居士請上堂師云太阿橫按截萬機於掌握之中寶鑑當臺現群像於無心之表有緣即應故問答以縱橫不令而行乃言像而罕測影響之士何足云哉復舉世尊臨涅槃時文殊請佛再轉法輪世尊咄云吾住世四十九年未嘗說一字汝請吾再轉法輪是吾曾轉法輪邪師云佛語真實寧可說龜有毛兔有角不可說佛言有二既然如是佛言四十九年未嘗說一字現在經一藏律一藏論一藏流遍天上人間從何得來若言是佛說即為謗佛若言不是佛說即為毀法見前大眾離此二過請說說看若還說得分曉說甚世尊涅槃我許此人親見釋迦文佛其或未然山僧只得下個註腳乃云不是江湖客休入洪波裏下座萬壽寺當家大亮同馬祖俊領眾請上堂師云道源不遠性海非遙但向己求莫從外覓眾位會麼復云含元殿上更覓常安慈氏宮中休問內院下座鵝房韓景壽領眾請上堂師云設使言前薦得猶是滯殼迷封縱饒句下精通未免觸途狂見只須坐斷毘盧不存凡聖而後性海揚波平地震雷猶較些子其或未然總是點額之類也卓拄杖下座觀音庵當家普庵領眾請上堂師云從上諸聖見人樂著塵勞不求出離遂生憐憫之心告之曰汝等眾生重貪嗔癡隨聲逐色與生死海內而無了期大眾好語言還慚愧麼諸聖恁麼道雖然如是已是打開布袋不能折合得山僧今日倒底傾出有人得者永息希求拈拄杖卓一下云此不是聲汝等尋常作麼生隨舉起拄杖云此不是色汝等尋常作麼生逐若能隨逐元無繫縛便是世上了達之人會麼不解審思量只道求佛難地藏庵比丘尼德藏領眾請上堂師云虛名虛相谷音鑑像棄而不修豈明幻妄少不努力老矣惆悵靜以思之隨機稱量且道量作麼生稱描不成兮畫不就讚不及兮休生受本來面目無覆藏世界壞時渠不朽張性樂同眾居士請上堂師云正宗淡泊異道崢嶸達磨大師所傳心印看看垂地也眾中還有見達磨大師者麼若有見者方解承當若有承當者山僧即兩手分付有麼有麼復云百丈若無雙耳聾臨濟怎解領三頓盡將業識作流傳此道今人棄如糞卓拄杖下座李似明居士領眾請上堂師云有時恁麼也得不恁麼也得恁麼不恁麼總得有時恁麼也不得不恁麼也不得恁麼不恁麼總不得眾位到此合作麼生即是復云掀翻地軸乾坤窄撥轉天輪宇宙寬須向強中呈好手虛空打破劫初看蓮花寺志心領眾請上堂師云頓明心即佛陡覺海非鹹善財樓閣路日進丹霄步凡夫云未然我道常披露會麼擬心一絲對面千里下座觀音閣當家秀宇領眾請上堂云山僧有時著珍御服居獅子座諸人見道是富貴長者之身有時著弊垢之衣跨出糞箕諸人盡道貧士之軀有時不著珍御不居獅座不穿弊衣不跨糞箕諸人到此喚作甚麼即得復云彌勒真彌勒分身百千億時時示時人時人皆不識拈拄杖云還識麼千個萬個但識取者個擲下拄杖下座冬至上堂僧問請問和尚身為幻體掊爐燒香必定是甚麼師云雪覆喬林同一色進云檀香半點終有益未知如來聞不聞師云你且道聞不聞進云滿空雲霧雪花墜師云罕逢穿耳客多遇刻舟人便打問和尚慈悲為眾個個海內尋針我今拾得獻與師尊師云癡人休說夢進云捨身入正道信即是佛心師云只管閑打哄乃云可笑千年事能將一念通相逢禪客問細細話吾宗鐵樹開花千萬朵石頭抽筍兩三莖泥塑金剛開口笑今朝冬至一陽生拽拄杖下座是日下雪繳水樓師德領眾請上堂師云迷者迷悟悟者悟迷迷悟同體悟者方知迷南為北實情取則北本是南悟無移忒返就迷緣莫得來處若了其心開佛知見都無斯事如其未然則有五旃陀羅與汝共住一窟常相謀害汝等有四惡蛇同汝共居常相吞噉汝等有黑暗無明燭常相照逐汝等有三猛毒常相驅逼汝等有伴黨六賊常相劫掠汝等法財珠寶汝等從今省悟秉智慧劍發堅固志斬卻魔軍輩安泰湛如蘇且道安泰後如何是非海裏橫身入豺虎群中自在行千山眾當家同谷居士請上堂師云混不得類不齊六爻宛轉見重離夜深下視千山白不是其中人不知眾位且道如何方知犀因玩月紋生角象被雷驚花入牙下座麻坨董如德劉中原領眾請上堂僧問人人有個生緣生緣在甚麼處師云有星皆拱北進云浩浩空中月新新一片紅師云汝腳跟下事又作麼生僧無語師便打乃云木伎機石女兒三冬陽氣勝六月降雪時有語非千舌無言切要詞會我最後句出世少人知且道作麼生是最後句聻分明記取下座新城徐明好領眾請上堂師云心光虛映體絕偏圓金波匝匝動寂常禪念起念滅不用止絕任運滔滔何曾起滅起滅寂滅現大迦葉坐臥經行未曾間歇會麼復云明鏡當臺照不差短長好醜盡歸家山河大地渾如故不妨隨處玩煙霞王大人屯宿邦傑周有選領眾請上堂師云無上玅道眼不可見耳不可聞非見非聞宛爾見聞見色聞聲脫出根塵水月鏡像夢幻施陳汝等曉得其中義也未此是如來清淨心要宜須決擇不可等閑光景流遷動如飛箭浮世如此人生幾何時不待人切須努力下座臘八日黃魁居士領眾請上堂僧問父母未生已前本來面目迷霧不知請和尚分剖師云遍界不覆藏進云日月照乾坤師云日月照乾坤與你分中有甚交涉僧無語師便打乃云今朝臘八明星出時悟釋迦嘆言奇哉一切眾生具有如來智慧德相但以妄想執著不能證得今問汝等阿那個是如來智慧德相汝等又還了得妄想也未若未了得切莫瞌睡也須著些精彩分曉一分曉始得又如來智慧德相不遠乎人人自遠耳大道微玅存不可見亡兮對面匪存匪亡森羅自現心外無法法外無心心法齊照境智甚深心亡照滅境智同歇一道通同十方俱攝還有到者個田地者麼復云四海風清煙浪靜碧天無際水無垠可憐業識忙忙者蹉過如來正法輪慈航寺闇然欣停領眾請上堂師云真實到家之者得意忘言伶俜在外之人隨情起解情解既起名相是興言意兩忘十方咸暢還知咸暢的事麼乃云十方世界永安寺大地山河是學徒隨順眾緣成解脫看來全不費工夫下座千山龍泉寺超玉領眾請上堂師云宗乘一舉古路縱橫若為措足苟非知方俊眼出格作者含冤上機舉一明三豈同流浪所以一句語中具三玄門一玄中具三要有縱有奪有殺有活照用臨時汝等大眾到此作麼生會復云家山指出路非遙萬仞嵯峨插碧霄一片白雲橫谷口幾多歸鳥盡迷巢下座徐公堡今進舒尚好領眾請上堂師云淘金豈假披沙得石觸波瀾猶費力露柱三更忽放光此時未審何人識遂拈拂子示眾云大眾還見麼若見見個甚麼若見個拂子正是凡夫見若言不見此是拂子如何說個不見的道理眾人到此須自忖量不可輕心取於流轉誠非小事實在悟明且道悟明的事作麼生處處綠楊堪繫馬家家門口透長安廣佑寺住持法海領眾請上堂師云昔祗園須菩提問世尊云何應住世尊答云胎生卵生濕生化生有色無色有想無想等皆令入無餘涅槃而滅度之而實無有一眾生實滅度者還會得麼三界實無絲毫生滅動靜之相皆由迷此決定惑為色身之內迷俗稱為我邪徒喚作神是我何曾我言神豈是神人生須特達乃拈拄杖云丈六紫金身也不屈著你下座元旦上堂師云一句為君傳今朝是大年汝若入此門不直半文錢半文錢不直萬國競爭觀所以向子說大道體最寬還知得麼途中多少尋春客誤聽黃鸝作杜鵑下座泰寧寺性德領眾請上堂師云循言執滯病在見聞杜口藏形過歸傍認欲得決求大寶莫作小商撒手懸崖當空便擲百千三昧豈在外求若認語言即名邪解至音絕韻妙曲非聲既然絕韻非聲眾位到此作麼生會復云無星秤子兩頭平提起應須見得明若向個中分觔兩知渠錯認定盤星萬壽寺祖旺崔文登王自臺張文禮設齋請上堂因事乃云古人道祖師不西來少林有妙訣大眾還理會得麼若理會不出切記努力前進真參實悟始得不可掠虛近時有等影響之流前後覺觸見人請益知識掠得來些言語出入遊戲不究竟真實大事止認個識神到處掠虛古人喚作弄精魂弄猢猻他日後閻老子鐵棒豈肯放過汝等果為己事切記真實但能情亡理喪計盡途窮無施設處用心正是你做工夫處只到懸崖撒手死中得活絕後再甦通古徹今一一從自胸中流出與麼蓋天蓋地去豈不俊哉若不到者個田地誤墮影響時流中也跟著認識神弄精魂牽猢猻牽來弄去弄到臘月三十日精魂散了猢猻走了黑面老子算帳喫鐵棒時莫言山僧不道切記鄭重元宵日井兒屯居士王信安領眾請上堂師云文殊寶剎觀音普門周羅法界唯子一人身土交映妙絕凡聖本有天真非病不病長歌且唱玅舞更誇妙舞則可更作麼生誇復云塗盃怪樣也奇哉神頭鬼面舞三台千千萬萬人窺看咦仔細不知誰見來坤寧庵寬智王國良請上堂師云打動永安鼓喚起鐵餕餡請君一咬破山僧豈相賺古人曾得力滋味今不減若也不奈何好個鐵餕餡還咬嚼得麼復云提起須彌第一槌電光石火太遲遲象王行處狐蹤絕獅子跑吼百獸危解制上堂師云尊者憍陳如九旬最親切老少幸相依上下皆歡悅且道歡悅事作麼生鴻鵠一舉千里飛鑽雲鷂子與天齊鳳凰不是凡間物為瑞為祥自有時下座福田寺師誕日上堂乃云撈漉愛河之弱子常行般若之慈舟專設最上之妙藥恒懷周濟愈方休復舉古德有僧問云和尚高壽德云老僧與太虛空同庚師云福田則不然若有人問和尚高壽直向他道虛空是吾弟予乃是長兄若要討端的問取太虛空且道與古人相去多少便下座蓋州一花五公為薦考妣請陞座座主似也問葉居士請和尚上堂是何意旨師云專為超薦也喝師便打也云一棒落在甚處師云量你不知痛癢又打進云一聲喝出黑牛尾師云著乃云無邊剎海自他不隔一毫端十世古今始終不離於當念所以由心生故種種法生由心滅故種種法滅既然如是一花五公今請山僧陞寶花座顯揚大法演最上乘薦先考妣從周葉居士並於高氏且道即今從周高氏生也滅也還有知落處者麼若有知者也許此人具一隻眼其或未然山僧只得重復舉示大眾從周高氏仗孝子五公一念至誠之心天宮佛土隨願往生此土他方逍遙自在得如意解脫證如意安樂既仗五公得解脫證安樂且道五公又承阿誰恩力不見道靈丹一粒點鐵成金至理一言轉凡成聖眾位還要會至理一言麼分明記取卓拄杖下座附閭山大觀音閣結制掛鐘板師掛板畢拈槌云木闍黎木闍黎從來你與眾人助揚發機閭山今日不圖汝鼓舞揚聲貴要你宗風不墜大眾且道如何便得宗風不墜遂擊板云若將耳聽終難會眼處聞聲是始真附齋單肩擔石貳腰纏八斗費力不少百丈打破醬甕是何心行若還會得坐餐無米飯渴飲趙州茶其或未然飯籮邊餓煞怪融道人不得又堆山積嶽來盡塵埃虎驟龍驤徹底掀翻永安只得打開寶藏庫滿盤托出鐵饅頭從教豎咬橫吞栗棘蓬任意加餐一個個飽齁齁地東倒西歪猶較懶融百步小參師云我此宗門秪論證悟不論會解若是為生死底人須求親證若是人我參學之徒只求解會到處覓相似語句遞相印證已後教壞好人家兒女我此門中都無斯事伏惟珍重小參云趙州道個洗缽盂去其僧豁爾知歸鳥窠吹起布毛侍者當下得旨為復就伊明破為復吐露向伊亦不是就伊明破亦不是吐露向伊汝等還會得麼本有之性為甚不會他為甚者等容易汝等為甚者等難不是向無信力必爾業惑海深須要具大慚愧起大信力發大志氣但辦肯心必不相賺玉堂有路通人到金榜無名只自慚下座師住觀音院因事退院小參云惡世道魔強法力難調治罪福罔不明因果撥無忌我此選佛場化為羅叉聚不停向奔波為是癡騃的閭山實俊哉非是道德衰豈不知明珠五百顆歷劫受殃災咦莫道佛法無靈驗因果影響迅若雷後監院卒也廣寧福田寺建禪堂完又師誕日錦城弟子上廣寧路值溪河瀑漲眾有二人沉沒水中幸無恙得為小參云一枝修竹建精藍風捲蟭螟入海南惡水潑來成第二鈍根蹉過問前三復云吾錦城弟子年年不顧炎熱流蒸蚊虻熾盛而來今年更不相同時值大雨淋淋江河瀑漲洪水滔滔不顧危險不惜身命一往直渡吾乃無一法與人參須自參悟須自悟來無所益何苦如是雖然信為道原功德母長養一切諸善根卓拄杖下座師庚子年遊千山回廣寧城守白護法及眾居士閭山建雙峰禪院上梁師拈拄杖指梁云歷遍乾坤無處尋偶然來住此幽林群峰排列雲霄碧蘚徑斜過草木深蒼松怪石無人識古樹垂陰眾目森若果地靈真有應兒孫千載法雷音遂起上梁住雙塔寺入院佛殿云夫如來者天中之天聖中之聖若有見者須當參禮且道山僧分上又作麼生太虛寥廓塵埃淨智鑑圓明物像殊遂展拜東塔隋建雙圖種佛因人傑地靈瑞色新眾僧檀越為古剎今日堪添一主人遂上香西塔水流東西雲起南北妙用透出乾坤外誰信佛祖境界寬監齋顯露處逼塞虛空隱密處蹤跡難尋隨處稱尊紅塵裡廣作神威護梵林方丈踞此室行此令且道此令作麼生行喝一喝云兵隨印轉將逐符行因事即退雙塔院事吾乃政教過闌東慇勤為人幾沒功林中內藏奸賊佞佛祖宗風何以弘垂問既是永安常住為甚終日家鬧轟轟的永安門前路往復行大步中間一塊磚諸仁者為甚蹋不著既然雪覆千山為甚孤峰不一色落堂師云喚作拄杖子則觸汝等喚作甚麼一僧進前擬奪拄杖師云喚作山河大地則觸不喚作山河大地則背汝又作麼生僧遶一匝師云是則似似則未是僧無語入室機緣一僧纔入師云如何是你未生已前本來面目僧喝師云者一喝落在什麼處僧無語師便打又一僧入師云一切眾生皆有佛性如何是你的佛性僧曰無師云無且置道無的又喚甚麼僧無語師便棒又僧入師云道看僧云飯是米做的師云飯是米做且置向未生已前道一句僧擬議師打云為甚不會又僧入師云如何是你本來面目僧云白棋盤師云那裏學得者虛頭來僧便出師云放汝三十棒又僧入師舉起香板云向這裡道句看僧噓一噓師云學者虛頭來僧擬議師震威一喝又僧入師云道看僧云千萬歸一師云一歸何處僧無語師便打又僧入師云如何是汝本來面目僧云風刮不著師云更道看僧無語師便棒勘辨機緣師在清江浦檀度寺有二道士與僧論玉皇大帝大過於佛其僧疑惑師向士云為甚麼殿裡佛坐梵王玉皇兩傍而立士云我說經中所言師云你還聞漢時白馬寺焚經之事麼有一道士姓杜名光庭所造之書皆杜撰汝曾聞否士茫然師責云汝卻將升斗量大海其當乎道士愧然而去師在都門普濟庵有付帕子二僧到菴欲難問方丈先至師寮問同寮僧東寺拜大悲懺見好相有否寮僧云不知僧云汝先在彼為甚不知師云縱有不好向人說二僧云好事怎說不得師云汝當好事文殊現像文喜擊之為何也僧云有幾個是文喜師云汝稱宗教俱通經云凡所有相皆是虛妄你如何講僧無語師云魔來若著即魔眷屬僧云聖魔現相有真有假師云魔來現相汝作麼生分辨僧又無語師云經中又道若以色見聲求是行邪道你如何會二僧總無語師云汝等全不通曉焉敢講法二僧抱愧而去寮僧復舉似方丈和尚尚笑云兩句經尚不知分曉說甚麼宗是打假旗號的今日遇著真滿州也師至河東謁國子公公問南泉斬貓就是恁麼斬了為別有意師云令不虛行公大悅張巡撫一日到永安寺設齋問師釋教儒教總一理師云大護法如何見得是一理曰總不越乎思師云你道思從何來曰思從心起師云心是何物思從心起張點首曰者就不知師云不知卻親切張大喜自讚慣說木札禪恒做生鐵漢幾翻親自走江南曾向祗園閒打算阿呵呵見不見今古令人皆不識永安寺踞汝獨判
