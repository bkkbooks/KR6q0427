body:
  text: 書記師印照德錄普說師云堂堂意氣走雷霆凜凜威嚴掃邪宗巨靈抬手無多子劈破華山千萬重還會麼若還會得山僧便下座其或未然更為饒舌參須真參悟須寔悟汝等切莫學邪徒而隨下流永安寺裡論實不論虛人皆謂永安執古非永安專意好執古觀今人不及古之人遠矣豈不思古人為萬世之標榜也昔汾陽禪師歷參七十餘員知識後到首山因問百丈捲席方大悟而遊衡湘每為郡守以名剎致請乃曰吾傳佛心印非細事也前後八請堅臥不答洎首山歿後西河道俗遣僧契聰迎請住持師閉關高枕聰排闥而入讓之曰佛法大事靖退小節風穴懼應讖憂宗旨墜滅幸而有先師先師已棄世汝有力擔荷如來大法者今何時也而欲安眠哉汾矍起握聰手曰非公不聞此語趣辦嚴吾行矣遂出世住持時慈明在眾參禪但有昏沉引錐自刺云古人為法忘軀我何人也焉敢放意汾州在河東地苦寒冷立者往往足指凍裂師因罷夜參一日宴坐有異僧仗錫乘雲而至問曰和尚何故罷夜參師答以苦寒之故僧云和尚會下有六人成大器願勿惜法施也言訖乘雲而去師明日陞座云胡僧金錫光為法到汾陽六人成大器勸請為宣揚自此夜參你看他父子是千古之榜樣也今人去聖時遙一代不如一代吾崇禎九年到南方見曾祖密老和尚白棒掀天中興臨濟之道參玄之士望風而至自密祖棄世又遇時荒人窮智短而被利名心牽動深可嘆也自從鼎革以來法門大變往往見住大院子老凍農不以法門為重耑喜白臉書生遇便東瓜印子亂搭教他拈古頌古又教讀儒書好相與士大夫圖門庭熱勝又不識廉恥而返誇我有好門徒令無知晚進空腹高心起大我慢未證謂證未得謂得認著驢鞍橋當阿爺下頷指鹿為馬喚鐘作甕卻將世間閑學解等閒埋沒祖師心正所謂一盲引眾盲相牽入火坑者是也若以聰明為是而世上科甲舉貢喚作悟道人得麼若以聰明當是者昔五祖會下七百高僧神秀大師是七百人教授師又是舊家更兼廣學為甚不傳衣缽續祖位也盧行者是個戴髮俗人又目不識丁而得衣缽須知古人耑以續佛慧命為切要貴圖佛種不斷豈同凡夫業識心動而塵勞先起造三途因結無間果融道人這等說話如有旁不肯的出來道你有甚長處便恁麼道融固無長處少福闕學惟有一味真寔余十九出家二十行腳至愍忠寺受戒後親覲蓮宗靜主學參禪領個念佛是誰的話頭往房山縣上方山龍虎嵎住靜將此話頭晝參夜參直得東西不辨南北不分一日睹水溝蠓虫有個入處後往南方參眾知識多蒙印証者奈自不肯撣人天重擔更到叢林中作務近見無知之徒道尚未曾夢著狂稱其悟而詐現知識之相憍倨自若魔氣所中生壞法之端此不肖之輩痛可惜焉余思欲退隱故轉都門息普濟菴復值本師介老和尚至京普濟請開堂正所謂不是冤家不聚頭固爾受其付囑往京東欲圖接得一個半個他日將報佛祖深恩亦報本師和尚之恩不想所到之處鬼魅為林狐精遍地愚癡僧俗皂白不分真假未辨但見粧模作樣便稱和尚不知是人是鬼豈曉佛耶魔耶而無尊無卑無父無子混成一團此邪見橫行於世正法輪摧毀謗隨和力欲擯逐不幸先聖晏駕而山僧心念休戚情隱山谷甘作一病叟耳忽浙中天目山來一禪師數千里相訪諫曰遼陽僧俗請和尚所為何事永安現有百五十大眾未見請益做工夫者是大眾懶耶是和尚法吝也余曰滿河堅冰一杓之沸焉能化乎禪師云雖是這等和尚還要慈悲為眾余然此事無一向固思古有一尊宿住於空寺向無學徒宿設方便至開堂日為泥羅漢說法所以道出常情非同比類汝等若木石乎眾聞此個個喜勇精進立志參禪賴此禪師一往大眾且道喜伊是惱伊是良久云珊瑚枕上兩行淚半是思君半恨君卓拄杖下座為狂生普說師云要識真金須入火再三煆煉見精麤上行買賣不饒讓好物從來價自殊眾位且道山僧作的是甚買賣蕭蕭蘆葦映江流獨棹孤蓬漾小舟細雨斜風渾不顧一心只在釣竿頭垂絲千尺意在得魚所貴者適意之錦鱗所重者鯨鯤之魚王若是蝦蟹蝦蟆只一跳而已矣豈能興波作浪震雷行雨三草二木難望潤澤有甚用處所以我此門中難得者千個萬個難得一個昔日靈山會上四十九年說不盡末後付飲光鞠多度人籌盈滿室惟許童子悟道少林面壁九年獨允慧可黃梅七百高僧單付搗碓行者山僧歸遼東以來十有餘載未曾得半個英靈衲子近日遇一可笑之事有一書生自稱鐵頑欲將斗杓以量東海擬扶杖而度須彌山僧一見愚狂固不理爾生隨處誇口謂山僧無言可對今向人天眾前判此愚昧之徒山僧不採爾者誠惜千斤之弩不為鼷鼠發機連城之璧焉與瓦礫相觸余固知爾乃折錐探地漏屋窺天折錐探地焉知地之淺深爾謂淺地地豈淺哉漏屋窺天焉知天之大小爾謂小天天豈小哉爾鐵頑不過井底之蛙管中見豹耳然又似螳螂怒其臂以當其轍吾乃七寶大車豈因螳螂之臂而不運進耶是不可也故就爾號鐵頑論之鐵也者即頑鈍之物也頑也者乃無知愚癡之輩也余固知爾不勝矣又焉知吾宗教外別傳不立文字之旨所以道吾宗無語句亦無一法與人縱有一言半句義在言外須向言外會取名為格外提持爾鐵頑韓盧逐塊何曾會意吾乃問堂眾既是永安常住為甚終日鬧轟轟地汝言有人語不是永安常住問爾鐵頑不喚作永安常住汝喚作什麼爾便意謂是店房爾還知店房中事麼若不知是妄言爾言向鬧裡求靜亦是妄言吾道那伽常在定無有不定時山僧又常說金波匝匝動寂常禪吾問眾道永安門前路往復行大步中間一塊磚諸仁者為甚蹋不著頑言眼前就是可惜無人拈來打破據汝亂道妄言豈曉旨趣吾示意言外非是窯燒之磚汝錯解妄謂拈來打破吾又示眾問雪覆千山為甚孤峰不一色頑又謂牧童本是放牛子怎奈面目不相同吾謂汝何曾識得牛來牛尚不識焉曉牧童且為汝說明牧牛之義昨夜三更前鐵牛耕遍田喫盡三春草吐氣在青天也無攔也無圈前山後山任方便牧牛童正憨眠坐斷毘盧世界寬自是牧童眼皮重汝又言若有好漢知道這永安常住是借歇店房我道這店房也開得起何故草足料足槽道方便事奉者慇勤只奈汝愚徒不知我者商賈所販何物我若不說汝卻不知吾祖白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今累兒孫汝又言從熱鬧場中獨自冷冷清清這個磚頭也踢得著問汝鐵頑你畢竟將甚麼喚作磚我若不說你驢年未夢見在我所謂盡十方世界是個永安常住一切有情心地是一塊磚若人悟得行也在上行立也在上立坐也在上坐臥也在上臥步步不離從上諸聖得此事者莫不統三界而攝四生號令人天扶顛極濟亦非分外頑又言這個孤峰也學得來山僧道設使言前薦得猶是滯殼迷封縱饒句下精通未免觸途狂見不墮二種離四句絕百非試問汝鐵頑作麼生學汝又言有聲有色還易得無色無聲始為難山僧道有色有聲是增添謗乃是常見之邪徒無色無聲是減滅謗亦是斷見之邪徒汝鐵頑敢言是麼是麼山僧道未在未在未在有可汝實不知謗法之愆懺中有一比丘雖持禁戒一言謗法八十一劫墮阿鼻地獄李鐵頑是何人焉敢謗法乎若要不招無間業莫謗如來正法輪大眾久立伏惟珍重茶話除歲云歲去換愁年春來物色鮮山花夾綠水巖樹舞青煙個個不可惱大家須喜歡喜歡則不無茶果價且止倘有人問汝等要飯錢時又作麼生遂云歸堂去曹溪水趙州茶金牛飯雲門餅永安寺裡鐵饅頭咬得永安寺裡鐵饅頭方解吞得雲門餅吞得雲門餅方曉喫金牛飯飲趙州茶沾曹溪水且道永安寺裡鐵饅頭作麼生下口縱然咬得著更問汝等是什滋味若不知滋味也須細嚼嚼始得拈古文殊請佛再轉法輪佛言吾住世四十九年未曾說一字拈云且道世尊意作麼生復云鐵牛耕破潭底月宋太宗皇帝問僧看甚麼經僧云仁王經帝云既是寡人經為甚麼在卿手裏僧無對拈云一人有慶闔國賴之昔有道士在殿前背佛而坐僧云道流莫背佛坐士云大德本教云佛身充滿於法界教我向甚麼處坐即得拈云者僧若是個伶俐漢當時待他恁麼道便坐在道士頭上士若言坐但向伊道佛身充滿於法界教我向甚處坐即得南泉問座主講得甚麼經主云彌勒經泉云彌勒什麼時下生主云現在天宮未來泉云天上無彌勒地下無彌勒拈云融道人即不然天上也是彌勒地下也是彌勒到處總是彌勒不知時人作麼生會初祖至梁國武帝問朕造寺度僧有何功德祖云實無功德帝曰如何是第一義諦祖云廓然無聖帝曰對朕者誰祖云不識帝不領悟祖遂渡江至魏拈云一箇懷藏至寶罕遇識者一箇是說藥人真藥現前尤不能識噫文喜禪師問文殊此間佛法如何住持殊曰龍蛇混雜凡聖同居喜曰多少眾殊云前三三後三三拈云者箇公案商量者既多錯會者不少融道人今日與迷人下箇註腳三箇三三一擔擔逢人不得錯舉湖南秪林每叱文殊普賢皆為精魅手持木劍自謂降魔纔有僧參便云魔來也魔來也以劍亂揮潛入方丈如是十二年後置劍無言有僧問十二年前為甚麼降魔林云賊不打貧兒家僧曰十二年後為甚不降魔林云賊不打貧兒家拈云好一箇難得的秪林只謂用盡自己心不知笑破他人口溈山祐禪師問雲巖承聞汝在藥山是否巖云是祐云藥山大人相作麼生巖云涅槃後有祐云如何是涅槃後有巖云水灑不著巖卻問溈山未審百丈大人相如何山云巍巍堂堂煒煒煌煌聲前非聲色後非色蚊子上鐵牛無你下口處拈云養子不若父家門一世衰雲巖當時待溈山道蚊子上鐵牛無你下口處便與他一喝若下得者一喝溈山只得瓦解冰消槃山示眾云向上一路千聖不傳學者勞形如猿捉影慈明云向上一路千聖不然天童傑云向上一路掘地覓天拈云師畫若向者裡會得方可持論其或未然不堪共語雖然如是融道人不妨另開方便旁通一線山云向上一路千聖不傳師云向上一路千聖的傳明云向上一路千聖不然師云向上一路千聖皆然傑云向上一路掘地覓天師云向上一路普遍大千且道與古人相去多少殃崛摩羅值婦產難拈云世尊如善射之人無法不中殃崛摩羅傳言送語有甚了期長者大似買石得雲饒頌古值婦產難頌云莫測風雲起老龍世界到處承霑蒙忽逢木馬潭中過蹋出金烏半夜紅乾闥婆王奏樂迦葉起舞頌云雲出岫兮無心月印江兮非意直饒雲月如然也是一場特地女子出定頌云清風吹動釣魚船鼓起澄江浪潑天蒼龍出水翻觔斗驚的漁人命不全七賢聖女頌云無根樹子枝頭動山谷無聲人住安陰陽難到奇特地開花結子任君觀布袋和尚頌云分身百億老長汀入廛垂手接知音高著眼莫粗心此回錯過實難尋南嶽思大師頌云坐斬千差不露痕傳言送語不堪論無端惹得山蠻令佛與眾生一口吞七處徵心頌云信手拈來用最親一回拈出一回新會後不必頻頻舉八兩分明是半觔八還辨見頌云八還辨見意最親計窮忘盡始歸真不因西嶠殘水盡怎得東山一帶春阿難問迦葉頌云莫謂迦葉太瞞頇月照千山夜色寒倒卻門前剎竿著世上迷徒仔細看達磨至梁國頌云竺乾美翠一枝花見者愛要人盡誇猛風吹到支那地打頭遇著刻舟家二祖求法頌云尋常惜子恨不來及至子來懶話陪不是可師為法切管取渠儂空往回六祖得法頌云會遇師資元有由語中玄妙暗相投衲僧七百皆英俊獨許盧能出一頭風旛非動頌云片雲為雨下山頭潤濕群萌遍九州從此於中消息露松風江月正悠悠六祖不會佛法頌云圓明覺照絕念時更無一物可堪為不知不會超岐路妙體深玄不在斯六祖云吾有一物非青黃赤白汝等喚作甚麼頌云怪哉怪哉真怪哉飄飄仙子下瑤階直為渠儂遭跨下引得玉女笑滿腮不落階級頌云迥超今古類難齊佛祖無因識得伊無影樹下休要坐摩訶般若波羅蜜離四句絕百非頌云四句離未為奇百非絕較些些者僧元無收燕手來往奔波空自嗟密庵傑破沙盆頌云者箇破沙盆多劫用不盡智者難酬價愚流焉有分首山竹篦頌云首山竹篦太無端引得盲者落二三伶俐衲僧卻奪過劈面相呈會也麼忠國師無縫塔頌云巍巍峭峻迥雲霄卓破虛空勢轉遙坐斷千差沒朕跡幾多描邈不能超百丈三日耳聾頌云石牛吐出三春霧靈雀不棲無影樹空中一聲霹靂響洪雨盆傾遍地注百丈野狐頌云攜手相將過海東使船全在把稍翁無端觸碎珊瑚樹獨露清光宇宙中一物即不中頌云說似一物即不中八年方契賣柴翁全體大用頭頭顯潛修密證祖佛同鶴林無棲泊處頌云玉磚高舉扣金門引出珊瑚價難論莫謂僧來渠不著佛祖猶是眼中塵破灶墮為灶神說法頌云聖從何來靈何起認著泥瓦當自己棒下機關透脫時瞥然頓證無生理即心即佛非心非佛頌云跳出離微是非關橫身物外任安閑莫將是非來辨我一任黃河九曲灣虛空為鼓須彌為槌頌云虛空為鼓須彌槌要打便打休問誰我不說人不曉卓爾難將正眼窺向上一路千聖不傳頌云千聖不傳本非慳恐隨流水到人間無端石人得共意一拳擊碎祖師關烏臼禪師被僧奪棒打頌云大鵬無伴過天池獅子將兒絕後隨紫氣夜隨丹鳳轉金龍纏倒月中枝亮座主隱跡西山頌云多年錯認心講論馬祖指點悟真空自從松聲來有韻長憶溪水去無蹤泥牛鬥入海頌云泥牛入海絕消息眾人爭勝賽擒騎欲窮滄浪深深處聽取漁家輒莫迷溈山踢倒淨瓶頌云善用機要是大溈元老非比類難齊如今不紹家私者休向瓶邊覓是非大唐國裏無禪師頌云滿目觀來無知己摩尼如意誰辨真少遇作家穿耳客多逢頑愚刻舟人普化明頭來明頭打頌云門頭戶尾事千差箭鋒相拄豈歪斜撒手到家何所有琉璃寶殿鎖蟾華庭前柏樹子頌云波原水也水原波人問西來柏指他自從舞得三臺後拍拍元來總是歌雜錄康熙壬寅年過都京掃月心笑祖塔師拈拄杖指塔云大眾還知笑祖端的麼曾言本來真父母佛眼覷不見今遠孫又不恁麼若人問融本來真父母見不見直向伊道九九八十一大眾且道是同是異若人苟能甄別管取平步丹霄遂上香戊申冬過嘉興府如如菴埽萬如法祖齒髮塔上供拈香云法祖法祖法裔廣盛惟融嫡孫不在其數為甚不在其數若在其數堪作什麼別外分枝橫列派普天涯遍潤枯槁遂上香和密雲悟祖題京口金山寺詩韻萬里江心獨出頭撐天一柱砥中流名雄千古遊無倦斜日高歌駕客舟附原韻波中卓出始昂頭裂破長江兩道流隔岸紅塵飛不到三三兩兩度人舟辛丑年師在廣寧普慈寺出示邪教檄文夫東土從古已來儒釋道三教為正除三之外悉是邪人不依正理自作幾篇俗話造些妖言異句惑亂癡騃無智又盜竊佛門經偈語錄採集成章一人傳虛萬人傳實騙哄愚迷墮險落難只圖一時龜毛之小利豈顧萬劫地獄之深坑此貪竄之流識者旁觀真可憐愍真可憐愍又出經首八字以難魔徒而魔眾默不能對師復頌云以字不是八不成雄才世智那能評聰明波旬尤未曉造次魔子豈知名答徐可勗見寄佳什兼次風字韻拶破太虛空方顯丈夫雄時人知恩少斷臂雪尚紅憶昔東海上遙望蓬萊宮獨誇獅子步八面不通風示捷貫書記竿頭絲線汝須收遇海逢江漫下鉤直到毘盧峰頂上解開纜放濟人舟行實順治戊戌師住廣寧閭山大觀音院一日兩序領眾啟請敘說行實師云所謂行實者古人年尊德邁履踐幽微或自說以警後裔或記錄以垂龜鑑融乃臘輕德薄操守荒疏況恃怙早亡未攻文墨奚以當言行實哉眾曰和尚過遜也古既如是今乃亦然如不親聞焉知往事師含笑曰是汝等好事非我過也遂云某非異鄉人也即此遼左蓋州王氏子父諱有賢母蘇氏昆季二人獨某幼時見僧而喜母常嘆曰吾家有一善根也丱歲時遊戲山前忽然心中生疑意謂此山依地而有地依虛空虛空以何為依耶比時雖頑稚遂動出家之想不期十一歲時先君早逝十五又母亡一時家產蕩盡得依外祖恩撫至十九屢遭離亂決意出家投寧遠西關白衣菴正印老宿薙髮明年遂行腳二十二至京師授愍忠寺太虛和尚戒後禮蓮華菴教宗禪師請問本分事宗曰汝且去參念佛的是誰當時領此話頭尋止京西龍虎嵎住靜將此話頭橫在胸中晝參夜參如癡若騃直得忘餐廢寢東西莫辨一日小解忽睹溝中蠓虫倍起疑情念曰此等眾生形質雖微佛性若何沉吟既久豁然有省便述偈曰剖破微塵得大經渠儂提起越功勳吾今打開分明說世上迷流那曉聞二十四歲至金陵古林菴發心作務擔柴運水勞力身染重疾後病愈又往姑蘇堯峰山參林皋和尚問燈燈相續意旨如何皋云你參去某云者老漢話頭也不識便出方丈皋次日入堂問曰世尊拈花迦葉微笑其意如何某云買金遇著賣金人皋云不是者個道理某云和尚也不得壓良為賤皋休去後參顯聖爾密和尚問根本即不問差別請師明密云既會根本差別不消說得某云實不明望師指示密云千江有水千江月千江之月一月攝某云覓一月尚不可得說甚千江之月密笑云向你道不須說密一日陞座某問眾手淘金誰是得者密云罕遇其人某舉坐具云者個聻密云你道看云某甲不道且要和尚疑著密云靠老僧作麼又參廣孝具德和尚問近離甚處某云顯聖德云去年那邊住曰徑山德云徑山顯聖俱落死水何不到天童去曰天童與廣孝有何差別德云徑山顯聖甚靜天童太鬧我者裡總不恁麼某云若然也不得放過德云你一向作麼工夫曰騎牛不覓牛德云汝被理所縛也某云和尚又如何德云豈不聞德山入門便棒臨濟入門便喝汝為甚坐在此某云德山臨濟意旨如何德便喝某遂禮謝又參金明若水禪師問向在那邊住過曰去冬顯聖今春廣孝水舉如意云顯聖廣孝還有者個麼曰盡法界一個不無水云喚著則觸不喚著則背汝作麼生某一喝便出隨令侍者留住水一日講金剛經令眾逐節作頌有同參請某頌某辭不已為眾頌世尊敷座云世尊敷座空生看破個事若何飯是米做水見甚喜判云句意俱妥又問空生看破的眼在甚麼處某云盡法界是空生一隻眼又令頌所謂佛法即非佛法頌云嗅著則觸不嗅則背觸背俱離非貴非賤又令下五位君臣頌語頌云學道先須識自宗某云向外馳求了也頌云莫將真際雜頑空某云我執不除頌云妙明體盡知傷觸某云賊人心虛頌云力在逢緣不借中著云本無內外說甚麼中頌云出語直教燒不著某云也須仔細眉毛頌云潛行須與古人同著云是甚所在說古道今頌云無身有事超岐路著云咄又恁麼去也頌云無事無身落始終某云情知你放不下又參報恩玉林和尚問迸碎虛空時如何林云你在那裡站立某拂坐具歸眾林便喝林一日上堂某問臨濟道第一句薦得堪與佛祖為師即今國裡還有個巴也無林云有某云即今在甚麼處林云舉眼便見某云馬將軍旗前撫掌林一日掛牌令眾作本來面目頌某頌云填溝塞壑滿虛空無限群靈在此中自從金鎖玄關碎寶藏元來用無窮林印可之金粟參費隱和尚遂問和尚以何法為人費云山僧只有一條拄杖子某云看破者老漢了也費捉住云你見個甚麼道理便恁麼道某云不妨疑著費打某便喝費云念汝遠來且坐喫茶某云是何言語又一日問某堂前露柱懷胎是男是女某云也不是男也不是女費打云是甚麼某云描也描不就畫也畫不成費云亂道某喝云者老漢是何心行費喝某亦喝遂拂袖而出至遯村參浮石和尚問石而能浮承誰恩力石云進前來向汝道某進前便喝石云再喝一喝看曰和尚喚作喝那石云汝又作麼生某一喝遂拂袖出又端午日上堂某問端午陞座即不問二人相戰必定是那一個得勝石震威一喝某遂作禮石云放汝三十棒某起以坐具向座上作劈勢石便休自是歷遍諸方參尋知識後轉都門普濟菴遇本師和尚開堂命典知藏師上堂日某出問濟宗爐鞴都京重開四海英靈咸集此會和尚如何煆煉師打云一棒一條痕融云莫便是和尚為人處麼師云闍黎還薦取麼融云頂門具眼方堪曉耀古騰今達者知師便喝融云萬煆爐中鐵蒺藜佛祖當塗不讓伊師云好個消息某禮謝歸眾其後將古機緣謷訛公案一一舉出命眾拈頌某便拈頌甚愜本師之意遂將源流衣拂拄杖一并付囑可為祖禰不了殃及兒孫這便是融上座半生行腳今被諸公苦逼不覺失口道出倘有個漢也似山僧這般鈍置正好三十拄杖趁出久立珍重
